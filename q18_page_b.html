<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q18 - Page B (Embedded Page)</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #27ae60, #2ecc71);
            color: white;
            height: 100%;
        }
        h2 { margin: 0 0 10px; font-size: 1.4em; }
        p { margin: 5px 0; font-size: 0.95em; }
        ul { padding-left: 20px; }
        li { margin: 4px 0; }
    </style>
</head>
<body>
    <h2>📄 Page B – I am the Embedded Page!</h2>
    <p>I was loaded inside <strong>Page A</strong> using the <code>&lt;iframe&gt;</code> tag.</p>
    <p>This demonstrates how HTML pages can be nested inside each other.</p>
    <ul>
        <li>IFrame Source: <code>q18_page_b.html</code></li>
        <li>Loaded By: <code>q18_page_a.html</code></li>
        <li>Tag Used: <code>&lt;iframe src="q18_page_b.html"&gt;</code></li>
    </ul>
</body>
</html>
