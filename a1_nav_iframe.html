<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iFrame Navigation Menu</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            height: 100vh;
            margin: 0;
        }
        nav {
            width: 200px;
            padding: 20px;
            background-color: #f4f4f4;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        nav a {
            text-decoration: none;
            color: #333;
            padding: 5px 0;
        }
        main {
            flex-grow: 1;
            padding: 20px;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: 1px solid #ccc;
        }
    </style>
</head>
<body>

 <nav>
    <b>navigation</b>
    <a href="https://www.wikipedia.org/" target="display-frame">wikipedia</a>
    <a href="https://www.youtube.com/embed/HcOc7P5BMi4?si=hsPRay3KWENZLE1" target="display-frame">youtube</a>
    <a href="child.html" target="display-frame">Local page</a>
 </nav>
 <main>
    <iframe name="display-frame" src="about:blank" title="content-window"></iframe>
 </main>
</body>
</html>
